<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotobox Galerie</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .thumbnail-container { position: relative; aspect-ratio: 3 / 2; overflow: hidden; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .thumbnail-container:hover { transform: scale(1.04); }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; background-color: #222; }
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .lightbox.open { opacity: 1; pointer-events: auto; }
        .lightbox-img { max-width: 95vw; max-height: 95vh; object-fit: contain; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <h1>📸 Fotobox Galerie</h1>
    <div class="grid" id="galerie-grid"></div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" class="lightbox-img" src="" alt="Vollbild">
    </div>
    <script>
        const grid = document.getElementById('galerie-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        function loadGallery() {
            fetch('/api/fotos').then(res => res.json()).then(data => {
                grid.innerHTML = '';
                if (data.fotos.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">Noch keine Fotos geschossen.</p>';
                    return;
                }
                const sortierteFotos = [...data.fotos].sort().reverse();
                sortierteFotos.forEach(foto => {
                    const container = document.createElement('div');
                    container.className = 'thumbnail-container';
                    container.onclick = () => openLightbox('/get_photo/' + foto);
                    const img = document.createElement('img');
                    img.src = '/get_photo/' + foto;
                    img.className = 'thumbnail';
                    img.loading = 'lazy';
                    container.appendChild(img);
                    grid.appendChild(container);
                });
            });
        }
        function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('open'); }
        function closeLightbox() { lightbox.classList.remove('open'); setTimeout(() => { lightboxImg.src = ''; }, 300); }
        loadGallery();
        setInterval(loadGallery, 30000);
    </script>
</body>
</html>
