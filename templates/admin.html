<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fotobox Admin</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f0f2f5; color: #333; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #0056b3; }
        #msg { margin-top: 15px; font-weight: bold; text-align: center; color: green; }
    </style>
</head>
<body>
    <h1>Fotobox Einstellungen</h1>
    <form id="configForm">
        <div class="form-group">
            <label>Countdown Zeit (Gesamtdauer in Sek.):</label>
            <input type="number" name="countdown_time" value="{{ config.countdown_time }}" min="1" max="10">
        </div>
        <div class="form-group">
            <label>Cheese Text:</label>
            <input type="text" name="cheese_text" value="{{ config.cheese_text }}">
        </div>
        <div class="form-group">
            <label>Pre-Trigger Zeit (Klack-Vorlauf in Sek.):</label>
            <input type="number" name="pre_trigger_time" value="{{ config.pre_trigger_time }}" step="0.1" min="0.5" max="3">
        </div>
        <div class="form-group">
            <label>Anzeigedauer Foto (Sekunden):</label>
            <input type="number" name="show_photo_time" value="{{ config.show_photo_time }}" min="2" max="20">
        </div>
        <div class="form-group">
            <label>Diashow Reihenfolge:</label>
            <select name="diashow_order">
                <option value="random" {% if config.diashow_order == 'random' %}selected{% endif %}>Zufällig</option>
                <option value="chronological" {% if config.diashow_order == 'chronological' %}selected{% endif %}>Chronologisch</option>
            </select>
        </div>
        <div class="form-group">
            <label>Diashow Bilddauer (Sekunden):</label>
            <input type="number" name="diashow_duration" value="{{ config.diashow_duration }}" min="2" max="30">
        </div>
        <button type="submit">Einstellungen speichern</button>
    </form>
    <div id="msg"></div>
    <script>
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch('/save_settings', { method: 'POST', body: new FormData(this) })
            .then(res => res.json()).then(data => {
                if(data.status === 'success') {
                    document.getElementById('msg').innerText = "Erfolgreich gespeichert!";
                    setTimeout(() => { document.getElementById('msg').innerText = ""; }, 3000);
                }
            });
        });
    </script>
<hr>
<h3>🛠️ Diagnose & Fehlerbehebung</h3>

<div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
    <h4>Kamera-Status</h4>
    <p>
        <strong>Status:</strong> 
        <span id="cam-status-badge" style="padding: 5px 10px; border-radius: 3px; background-color: #ffc107; color: #000;">
            Wird geprüft...
        </span>
    </p>
    <p id="cam-details" style="color: #6c757d;">Frage gphoto2 ab...</p>
    
    <button onclick="checkCameraStatus()" style="padding: 8px 15px; margin-right: 10px;">🔄 Status aktualisieren</button>
    <button onclick="resetCamera()" style="padding: 8px 15px; background-color: #dc3545; color: white; border: none; border-radius: 3px;">
        ⚠️ gphoto2 Reset (Prozesse killen)
    </button>
</div>

<script>
// Funktion zum Abfragen des Status
function checkCameraStatus() {
    const badge = document.getElementById('cam-status-badge');
    const details = document.getElementById('cam-details');
    
    badge.style.backgroundColor = '#ffc107';
    badge.style.color = '#000';
    badge.innerText = 'Wird geprüft...';
    details.innerText = 'Bitte warten...';

    fetch('/api/camera_status')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'connected') {
                badge.style.backgroundColor = '#28a745';
                badge.style.color = '#fff';
                badge.innerText = 'Verbunden';
            } else if (data.status === 'disconnected') {
                badge.style.backgroundColor = '#6c757d';
                badge.style.color = '#fff';
                badge.innerText = 'Nicht verbunden';
            } else {
                badge.style.backgroundColor = '#dc3545';
                badge.style.color = '#fff';
                badge.innerText = 'Fehler / Hängt';
            }
            details.innerText = data.details;
        })
        .catch(error => {
            badge.style.backgroundColor = '#dc3545';
            badge.innerText = 'Netzwerkfehler';
            details.innerText = error;
        });
}

// Funktion zum Zurücksetzen (Prozesse killen)
function resetCamera() {
    if(!confirm("Möchtest du wirklich alle gphoto2 Prozesse beenden? Dies löst Blockaden, bricht aber eventuell laufende Übertragungen ab.")) {
        return;
    }
    
    fetch('/api/camera_reset', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            // Nach dem Reset direkt den Status neu prüfen
            setTimeout(checkCameraStatus, 1000);
        })
        .catch(error => {
            alert('Fehler beim Reset: ' + error);
        });
}

// Beim Laden der Seite sofort den Status prüfen
document.addEventListener("DOMContentLoaded", function() {
    checkCameraStatus();
});
</script>
</body>
</html>
